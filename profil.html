<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Form Profil</title>

	<link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

	<style>

		*{
			margin:0;
			padding:0;
			box-sizing:border-box;
		}

		body{
			min-height:100vh;
			font-family:'Poppins', sans-serif;

			/* GRADASI PINK SOFT */
			background: linear-gradient(
				135deg,
				#ffd6ea,
				#ffc2df,
				#ffb1d5,
				#ffeaf4
			);

			display:flex;
			justify-content:center;
			align-items:center;
			padding:40px;
		}

		.container{

			width:100%;
			max-width:700px;

			background:rgba(255,255,255,0.35);
			backdrop-filter:blur(14px);

			padding:50px;
			border-radius:35px;

			box-shadow:
			0 10px 40px rgba(255,79,160,0.18);

			border:1px solid rgba(255,255,255,0.5);
		}

		h1{
			font-size:60px;
			margin-bottom:20px;
			font-family:'Inknut Antiqua', serif;
			font-weight:bold;
			color:#222;
			line-height:1.3;
		}

		p{
			font-size:17px;
			margin-bottom:35px;
			color:#666;
			line-height:1.8;
		}

		label{
			display:block;
			margin-top:18px;
			margin-bottom:8px;
			font-size:15px;
			font-weight:500;
			color:#444;
			letter-spacing:1px;
		}

		input,
		textarea{

			width:100%;
			padding:15px 18px;

			font-size:15px;
			font-family:'Poppins', sans-serif;

			border:none;
			outline:none;

			border-radius:18px;

			background:rgba(255,255,255,0.8);

			box-shadow:
			inset 0 2px 5px rgba(0,0,0,0.05);

			transition:0.3s;
		}

		input:focus,
		textarea:focus{

			background:white;

			box-shadow:
			0 0 0 3px rgba(255,79,160,0.2);

		}

		textarea{
			height:90px;
			resize:none;
		}

		button{

			margin-top:35px;

			padding:15px 35px;

			border:none;
			border-radius:50px;

			background:linear-gradient(
				to right,
				#ff4fa0,
				#ff7bb8
			);

			color:white;

			font-size:15px;
			font-weight:500;
			letter-spacing:1px;

			cursor:pointer;

			box-shadow:
			0 8px 25px rgba(255,79,160,0.3);

			transition:0.4s;
		}

		button:hover{

			transform:translateY(-4px);

			box-shadow:
			0 12px 30px rgba(255,79,160,0.4);

		}

		/* RESPONSIVE */

		@media(max-width:768px){

			.container{
				padding:35px 25px;
			}

			h1{
				font-size:38px;
			}

			p{
				font-size:15px;
			}

		}

	</style>

</head>

<body>

	<div class="container">

		<h1>Form Profil</h1>

		<p>
			Isi data diri singkat di bawah ini, lalu tekan tombol simpan
			untuk melihat hasil profil kamu dengan tampilan aesthetic ✨
		</p>

		<form id="profilForm">

			<label>NIM</label>
			<input type="text" id="nim" required>

			<label>Nama</label>
			<input type="text" id="nama" required>

			<label>Alamat</label>
			<textarea id="alamat" required></textarea>

			<label>Hobi</label>
			<input type="text" id="hobi" required>

			<label>Instagram</label>
			<input type="text" id="instagram" placeholder="@username" required>

			<br>

			<button type="submit">
				Simpan Profil
			</button>

		</form>

	</div>

	<script>

		const form = document.getElementById("profilForm");

		form.addEventListener("submit", function(event){

			event.preventDefault();

			// ambil data input
			const nim = document.getElementById("nim").value;
			const nama = document.getElementById("nama").value;
			const alamat = document.getElementById("alamat").value;
			const hobi = document.getElementById("hobi").value;
			const instagram = document.getElementById("instagram").value;

			// simpan ke localStorage
			localStorage.setItem("nim", nim);
			localStorage.setItem("nama", nama);
			localStorage.setItem("alamat", alamat);
			localStorage.setItem("hobi", hobi);
			localStorage.setItem("instagram", instagram);

			// pindah halaman
			window.location.href = "profiltampil.html";

		});

	</script>

</body>
</html>
