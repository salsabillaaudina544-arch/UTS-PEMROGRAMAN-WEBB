<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Profil Tersimpan</title>

	<link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

	<style>

		*{
			margin:0;
			padding:0;
			box-sizing:border-box;
		}

		body{

			min-height:100vh;

			font-family:'Poppins', sans-serif;

			background: linear-gradient(
				135deg,
				#ffd6ea,
				#ffc2df,
				#ffb1d5,
				#ffeaf4
			);

			display:flex;
			justify-content:center;
			align-items:center;

			padding:40px;

		}

		.container{

			width:100%;
			max-width:750px;

			background:rgba(255,255,255,0.35);

			backdrop-filter:blur(15px);

			border-radius:35px;

			padding:55px;

			box-shadow:
			0 10px 40px rgba(255,79,160,0.18);

			border:1px solid rgba(255,255,255,0.5);

		}

		h1{

			font-size:55px;

			font-family:'Inknut Antiqua', serif;

			font-weight:bold;

			color:#222;

			line-height:1.3;

			margin-bottom:20px;

		}

		p{

			font-size:17px;

			color:#666;

			line-height:1.8;

			margin-bottom:35px;

		}

		.data{

			background:rgba(255,255,255,0.6);

			padding:35px;

			border-radius:25px;

			box-shadow:
			inset 0 2px 8px rgba(0,0,0,0.03);

		}

		.item{

			margin-bottom:22px;

			padding-bottom:18px;

			border-bottom:1px solid rgba(0,0,0,0.08);

		}

		.item:last-child{
			border-bottom:none;
			margin-bottom:0;
		}

		.label{

			font-size:14px;

			letter-spacing:1px;

			text-transform:uppercase;

			color:#ff4fa0;

			font-weight:600;

			margin-bottom:8px;

		}

		.value{

			font-size:18px;

			color:#444;

			line-height:1.8;

		}

		.button-box{
			text-align:center;
		}

		button{

			margin-top:35px;

			padding:15px 38px;

			border:none;

			border-radius:50px;

			background:linear-gradient(
				to right,
				#ff4fa0,
				#ff7bb8
			);

			color:white;

			font-size:15px;

			font-weight:500;

			letter-spacing:1px;

			cursor:pointer;

			box-shadow:
			0 8px 25px rgba(255,79,160,0.3);

			transition:0.4s;

		}

		button:hover{

			transform:translateY(-4px);

			box-shadow:
			0 12px 30px rgba(255,79,160,0.4);

		}

		/* RESPONSIVE */

		@media(max-width:768px){

			.container{
				padding:35px 25px;
			}

			h1{
				font-size:38px;
			}

			p{
				font-size:15px;
			}

			.value{
				font-size:16px;
			}

		}

	</style>

</head>

<body>

	<div class="container">

		<h1>Profil Tersimpan</h1>

		<p>
			Berikut hasil data diri yang berhasil kamu simpan ✨
		</p>

		<div class="data">

			<div class="item">

				<div class="label">
					NIM
				</div>

				<div class="value" id="hasilNim"></div>

			</div>

			<div class="item">

				<div class="label">
					Nama
				</div>

				<div class="value" id="hasilNama"></div>

			</div>

			<div class="item">

				<div class="label">
					Alamat
				</div>

				<div class="value" id="hasilAlamat"></div>

			</div>

			<div class="item">

				<div class="label">
					Hobi
				</div>

				<div class="value" id="hasilHobi"></div>

			</div>

			<div class="item">

				<div class="label">
					Instagram
				</div>

				<div class="value" id="hasilInstagram"></div>

			</div>

		</div>

		<div class="button-box">

			<button onclick="kembaliForm()">
				Kembali ke Form
			</button>

		</div>

	</div>

	<script>

		// tampilkan data dari localStorage

		document.getElementById("hasilNim").innerText =
		localStorage.getItem("nim");

		document.getElementById("hasilNama").innerText =
		localStorage.getItem("nama");

		document.getElementById("hasilAlamat").innerText =
		localStorage.getItem("alamat");

		document.getElementById("hasilHobi").innerText =
		localStorage.getItem("hobi");

		document.getElementById("hasilInstagram").innerText =
		localStorage.getItem("instagram");

		function kembaliForm(){

			window.location.href = "profil.html";

		}

	</script>

</body>
</html>
